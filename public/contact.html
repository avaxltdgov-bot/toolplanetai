<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact - ToolPlanetAI</title>
  <meta name="description" content="Contact ToolPlanetAI for support, feedback, or business inquiries."/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#080810;color:#e4e4f0;padding:40px 20px;min-height:100vh}
    .container{max-width:600px;margin:0 auto}
    h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
    p{color:#9090b0;line-height:1.8;margin-bottom:20px;font-size:15px}
    .card{padding:24px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:16px}
    h2{font-size:16px;font-weight:700;color:#c4b5fd;margin-bottom:8px}
    a{color:#8b5cf6;text-decoration:none}
    .back{display:inline-block;margin-bottom:32px;padding:10px 20px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);border-radius:10px;color:#c4b5fd;font-weight:600}
    input,textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e4e4f0;font-family:'Outfit',sans-serif;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:12px}
    textarea{min-height:120px;resize:vertical}
    button{width:100%;padding:14px;background:linear-gradient(135deg,#8b5cf6,#f97316);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to ToolPlanetAI</a>
    <h1>Contact Us</h1>
    <p>Have questions, feedback, or business inquiries? We'd love to hear from you!</p>
    <div class="card">
      <h2>📧 Email Us</h2>
      <p><a href="mailto:support@toolplanetai.com">support@toolplanetai.com</a></p>
    </div>
    <div class="card">
      <h2>💬 Send a Message</h2>
      <input type="text" placeholder="Your Name"/>
      <input type="email" placeholder="Your Email"/>
      <textarea placeholder="Your message..."></textarea>
      <button onclick="alert('Thank you! We will get back to you soon.')">Send Message</button>
    </div>
    <div class="card">
      <h2>⚡ Response Time</h2>
      <p>We typically respond within 24-48 hours on business days.</p>
    </div>
    <p style="margin-top:40px;font-size:13px;color:#555">© 2025 ToolPlanetAI • <a href="/">Home</a> • <a href="/about.html">About</a> • <a href="/privacy.html">Privacy</a></p>
  </div>
</body>
</html>
